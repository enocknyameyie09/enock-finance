<!DOCTYPE html>

<html>

<head>

  <title>Create Account</title>

</head>

<body>

<h2>Open Microfinance Account</h2>

<input id="name" placeholder="Full Name"><br><br>

<input id="email" placeholder="Email"><br><br>

<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="register()">Create Account</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "YOUR_KEY",

  authDomain: "YOUR_DOMAIN",

  projectId: "YOUR_PROJECT_ID"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth();

const db = getFirestore(app);

window.register = async function () {

  let name = document.getElementById("name").value;

  let email = document.getElementById("email").value;

  let password = document.getElementById("password").value;

  try {

    const userCredential = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", userCredential.user.uid), {

      name: name,

      email: email,

      createdAt: new Date()

    });

    document.getElementById("msg").innerText = "Account created successfully!";

    window.location.href = "login.html";

  } catch (error) {

    document.getElementById("msg").innerText = error.message;

  }

};

</script>

</body>

</html>
<script type="module" src="firebase.js"></script>
